<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Standalone, self-contained interactive PROV viewer generated by
      renderInteractiveHtml: inline CSS + vanilla JS, the dagre-positioned scene baked in
      as JSON, no network, no CDN, no build step. Opening the file from file:// yields a
      working, explorable graph. (The generate-time slots that were replaced to produce
      this file are documented on the template source, not repeated here — a literal slot
      token in this comment would itself be substituted.)
    -->
    <title>__PROV_TITLE__</title>
    <style>
__PROV_STYLE__
    </style>
  </head>
  <body>
    <div id="prov-app">
      <header id="prov-header">
        <div class="masthead">
          <h1 id="prov-title">__PROV_TITLE__</h1>
          <p id="prov-counts" class="counts"></p>
        </div>
        <div class="controls">
          <div class="search-box">
            <input
              id="prov-search"
              type="search"
              placeholder="Search nodes…"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search nodes by name or label"
            />
          </div>
          <fieldset id="prov-kind-filters" class="kind-filters">
            <legend class="visually-hidden">Filter by node kind</legend>
          </fieldset>
          <div class="buttons">
            <button id="prov-show-all" type="button">Show all</button>
            <button id="prov-reset" type="button">Reset</button>
          </div>
        </div>
      </header>
      <div id="prov-stage">
        <main id="prov-canvas" aria-label="Provenance graph" tabindex="-1">
          <!-- The SVG scene is built once by the client from the embedded payload. -->
        </main>
        <aside id="prov-panel" class="panel" hidden aria-label="Selected node details">
          <!-- The attribute panel is populated by the client on selection. -->
        </aside>
      </div>
      <footer id="prov-hint" class="hint">
        Drag to pan · scroll to zoom · click a node for details · click a
        <span class="hint-badge">+n</span> badge to reveal hidden neighbors
      </footer>
    </div>
    <script type="application/json" id="prov-scene">
__PROV_PAYLOAD__
    </script>
    <script>
__PROV_APP__
    </script>
  </body>
</html>
