name: Test

# Validates every pull request: the unit suites, the 398-document PROV-JSON
# conformance corpus, the typecheck, and the built artifacts.
#
# The corpus is fetched as an explicit step rather than by leaning on the `pretest`
# hook, so that a failure to obtain the oracle is distinguishable in the logs from a
# genuine test failure — they mean very different things.
#
# The bootstrap tracks upstream `master` on purpose (see `scripts/bootstrap.mjs`):
# for a port whose entire value is fidelity to the reference, a corpus change
# upstream SHOULD surface here as a red build rather than as silent drift. If that
# ever gets noisy, pin it by setting `TSPROV_PROV_REF` on the bootstrap step.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # CITATION.cff restates package.json's version as citation metadata, and
      # it is what GitHub's "Cite this repository" button renders — so a stale
      # value ships as a wrong citation rather than as a broken build, which no
      # other check would catch. Zenodo archives this file off the tag too, but
      # derives its own record version from the tag name and ignores the version
      # key, so this guard serves the GitHub citation box and human readers, not
      # the DOI. Checked on every run, not only on bump PRs, because the drift
      # can equally arrive from an edit to CITATION.cff itself. Placed before
      # the toolchain and corpus steps because it needs nothing but the checkout.
      - name: Check CITATION.cff is in step with package.json
        run: .github/citation/sync.sh --check

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # The smoke step runs under Node on purpose: its ESM/CJS resolution is stricter
      # than Bun's, and it is the runtime our consumers actually use. 22 is the oldest
      # LTS line still in support — the floor consumers realistically run — while
      # release.yml smokes under 24, so both lines get coverage.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch the PROV-JSON conformance corpus
        run: bun run bootstrap

      # `bun run build` runs tsc over every workspace package in dependency order, so
      # this is the typecheck as well as the build. There is deliberately no separate
      # typecheck script.
      #
      # It MUST run before `bun test`: the render and eval suites import their workspace
      # siblings as bare specifiers (`@inflexa-ai/tsprov`, `@inflexa-ai/tsprov-render-*`)
      # that resolve through each sibling's `exports` map to `./dist/*.js`. On a fresh
      # checkout those dists do not exist yet, so a test-first order dies with
      # "Cannot find module '@inflexa-ai/tsprov'". Building first materializes them.
      - name: Build (this is also the typecheck)
        run: bun run build

      - name: Test
        run: bun test

      - name: Smoke-test the built artifacts
        run: bun run smoke
